<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopping Cart | AS Trend Point</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#111;
color:#fff;
}

.cart-page{
max-width:1200px;
margin:auto;
padding:20px;
}

.cart-title{
text-align:center;
font-size:36px;
color:#FFD700;
margin:20px 0 30px;
}

.cart-item{
display:flex;
gap:20px;
align-items:center;
background:#1b1b1b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.cart-item img{
width:130px;
height:130px;
object-fit:cover;
border-radius:12px;
}

.cart-info{
flex:1;
}

.cart-info h3{
font-size:22px;
margin-bottom:10px;
}

.cart-info p{
margin:8px 0;
}

.quantity{
display:flex;
align-items:center;
gap:10px;
margin-top:12px;
}

.quantity button{
width:35px;
height:35px;
border:none;
background:#FFD700;
border-radius:8px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

.remove-btn{
margin-top:15px;
padding:10px 20px;
background:#ff3b30;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

.summary{
background:#1b1b1b;
padding:25px;
border-radius:15px;
margin-top:30px;
}

.summary h2{
color:#FFD700;
margin-bottom:20px;
}

.summary p{
display:flex;
justify-content:space-between;
margin:12px 0;
font-size:18px;
}

.checkout-btn{
display:block;
margin-top:20px;
padding:16px;
text-align:center;
background:#FFD700;
color:#111;
text-decoration:none;
border-radius:10px;
font-weight:700;
font-size:18px;
}

.empty-cart{
text-align:center;
padding:80px 20px;
font-size:22px;
}

.back-btn{
display:inline-block;
margin-top:20px;
color:#FFD700;
text-decoration:none;
}

@media(max-width:768px){

.cart-item{
flex-direction:column;
text-align:center;
}

.cart-item img{
width:180px;
height:180px;
}

}

</style>

</head>

<body>

<div class="cart-page">

<h1 class="cart-title">
🛒 Your Shopping Cart
</h1>

<div id="cart-items">
</div>

<div class="summary" id="summary">
</div>
<script>

const cartItems = document.getElementById("cart-items");
const summary = document.getElementById("summary");

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function getPrice(price){
    return parseInt(String(price).replace(/[^\d]/g,"")) || 0;
}

function renderCart(){

    cartItems.innerHTML="";
    summary.innerHTML="";

    if(cart.length===0){

        cartItems.innerHTML=`
        <div class="empty-cart">
            Your cart is empty.
            <br><br>
            <a href="index.html" class="back-btn">
            ← Continue Shopping
            </a>
        </div>
        `;

        return;
    }

    let subtotal=0;

    cart.forEach((product,index)=>{

        const price=getPrice(product.price);

        subtotal+=price*product.quantity;

        cartItems.innerHTML+=`

        <div class="cart-item">

            <img src="${product.image}" alt="${product.name}">

            <div class="cart-info">

                <h3>${product.name}</h3>

                <p><b>Price:</b> ৳${price}</p>

                <p><b>Size:</b> ${product.size}</p>

                <div class="quantity">

                    <button onclick="changeQty(${index},-1)">−</button>

                    <span>${product.quantity}</span>

                    <button onclick="changeQty(${index},1)">+</button>

                </div>

                <button class="remove-btn"
                onclick="removeItem(${index})">

                Remove

                </button>

            </div>

        </div>

        `;

    });
        const delivery = 60;
    const total = subtotal + delivery;

    summary.innerHTML = `

    <h2>Order Summary</h2>

    <p>
        <span>Subtotal</span>
        <span>৳${subtotal}</span>
    </p>

    <p>
        <span>Delivery</span>
        <span>৳${delivery}</span>
    </p>

    <p style="font-size:22px;font-weight:bold;">
        <span>Total</span>
        <span style="color:#FFD700;">৳${total}</span>
    </p>

    <a href="checkout.html" class="checkout-btn">
        Proceed to Checkout
    </a>

    `;

}

function changeQty(index,value){

    cart[index].quantity += value;

    if(cart[index].quantity < 1){
        cart[index].quantity = 1;
    }

    localStorage.setItem("cart",JSON.stringify(cart));

    renderCart();

}
function removeItem(index){

    cart.splice(index,1);

    localStorage.setItem("cart", JSON.stringify(cart));

    renderCart();

}

window.changeQty = changeQty;
window.removeItem = removeItem;

renderCart();

</script>

</body>
</html>
